name: Monday Morning Startup
on:
  schedule:
    - cron: '0 7 * * 1' # Mondays at 7:00 AM UTC
  workflow_dispatch:

jobs:
  startup:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Restore from Snapshot
        run: |
          # Find snapshots created by our script
          SNAPSHOTS=$(doctl compute snapshot list --format ID,Name --no-header | grep "auto-")

          if [ -z "$SNAPSHOTS" ]; then
            echo "No 'auto-' snapshots found."
            exit 0
          fi

          echo "$SNAPSHOTS" | while read -r SNAP_ID SNAP_NAME; do
            echo "Processing Snapshot: $SNAP_NAME"

            # Parse the name back into variables
            # auto-webserver-s-1vcpu-2gb-nyc3-20231027
            # We use 'rev' and 'cut' to handle names that might have dashes in them
            ORIGINAL_NAME=$(echo "$SNAP_NAME" | cut -d'-' -f2)
            SIZE=$(echo "$SNAP_NAME" | rev | cut -d'-' -f3,4,5 | rev)
            REGION=$(echo "$SNAP_NAME" | rev | cut -d'-' -f2 | rev)

            echo "Restoring $ORIGINAL_NAME with size $SIZE in $REGION..."

            doctl compute droplet create "$ORIGINAL_NAME" \
              --region "$REGION" \
              --size "$SIZE" \
              --image "$SNAP_ID" \
              --tag-names "weekend-off" \
              --wait

            echo "Droplet restored. Deleting snapshot $SNAP_ID..."
            doctl compute snapshot delete $SNAP_ID --force
          done
